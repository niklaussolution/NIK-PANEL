runConfig:
  runtime: nodejs20
  concurrency: 100
  minInstances: 0
  maxInstances: 10
  cpu: 1
  memoryMiB: 512

env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyCMGrNMyPp9UaaGj42R7xGd6Z_53iR8eNc
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: niklaushost.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: niklaushost
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: niklaushost.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "936533338093"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: 1:936533338093:web:9d6c0e8fbd5ecfa7c0a9e4
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_RAZORPAY_KEY_ID
    value: rzp_live_Rvof1bESnec5Iq
    availability:
      - BUILD
      - RUNTIME

  # Secret variables — stored in Firebase Secret Manager
  - variable: FIREBASE_ADMIN_PROJECT_ID
    secret: FIREBASE_ADMIN_PROJECT_ID

  - variable: FIREBASE_ADMIN_CLIENT_EMAIL
    secret: FIREBASE_ADMIN_CLIENT_EMAIL

  - variable: FIREBASE_ADMIN_PRIVATE_KEY
    secret: FIREBASE_ADMIN_PRIVATE_KEY

  - variable: RAZORPAY_KEY_ID
    secret: RAZORPAY_KEY_ID

  - variable: RAZORPAY_KEY_SECRET
    secret: RAZORPAY_KEY_SECRET

  - variable: RAZORPAY_WEBHOOK_SECRET
    secret: RAZORPAY_WEBHOOK_SECRET
