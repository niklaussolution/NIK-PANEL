<svg width="560" height="460" viewBox="0 0 560 460" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF3E8"/>
      <stop offset="1" stop-color="#E6F0FF"/>
    </linearGradient>
    <linearGradient id="hserver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#F3F4F6"/>
    </linearGradient>
    <filter id="hsh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect x="20" y="20" width="520" height="420" rx="32" fill="url(#hbg)"/>

  <!-- orbit ring -->
  <circle cx="280" cy="230" r="170" stroke="#0066FF" stroke-opacity="0.15" stroke-width="2" stroke-dasharray="6 8"/>

  <!-- central server tower -->
  <g filter="url(#hsh)">
    <rect x="200" y="120" width="160" height="220" rx="18" fill="url(#hserver)" stroke="#E5E7EB"/>
    <g>
      <rect x="218" y="142" width="124" height="34" rx="8" fill="#fff" stroke="#EAECEF"/>
      <circle cx="236" cy="159" r="5" fill="#FF6B00"/>
      <rect x="252" y="154" width="70" height="4" rx="2" fill="#E5E7EB"/>
      <rect x="252" y="162" width="48" height="4" rx="2" fill="#EEF1F4"/>
    </g>
    <g>
      <rect x="218" y="186" width="124" height="34" rx="8" fill="#fff" stroke="#EAECEF"/>
      <circle cx="236" cy="203" r="5" fill="#0066FF"/>
      <rect x="252" y="198" width="70" height="4" rx="2" fill="#E5E7EB"/>
      <rect x="252" y="206" width="40" height="4" rx="2" fill="#EEF1F4"/>
    </g>
    <g>
      <rect x="218" y="230" width="124" height="34" rx="8" fill="#fff" stroke="#EAECEF"/>
      <circle cx="236" cy="247" r="5" fill="#22C55E"/>
      <rect x="252" y="242" width="70" height="4" rx="2" fill="#E5E7EB"/>
      <rect x="252" y="250" width="54" height="4" rx="2" fill="#EEF1F4"/>
    </g>
    <g>
      <rect x="218" y="274" width="124" height="34" rx="8" fill="#fff" stroke="#EAECEF"/>
      <circle cx="236" cy="291" r="5" fill="#FF6B00"/>
      <rect x="252" y="286" width="70" height="4" rx="2" fill="#E5E7EB"/>
      <rect x="252" y="294" width="46" height="4" rx="2" fill="#EEF1F4"/>
    </g>
  </g>

  <!-- floating badge: uptime -->
  <g filter="url(#hsh)">
    <rect x="64" y="150" width="132" height="60" rx="14" fill="#fff"/>
    <circle cx="92" cy="180" r="16" fill="#FFF3E8"/>
    <path d="M86 180l5 5 9-10" stroke="#FF6B00" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="116" y="168" width="60" height="7" rx="3.5" fill="#111827"/>
    <rect x="116" y="183" width="44" height="6" rx="3" fill="#9CA3AF"/>
  </g>

  <!-- floating badge: speed -->
  <g filter="url(#hsh)">
    <rect x="372" y="262" width="140" height="62" rx="14" fill="#fff"/>
    <circle cx="401" cy="293" r="16" fill="#E6F0FF"/>
    <path d="M403 285l-8 11h7l-2 8 8-11h-7z" fill="#0066FF"/>
    <rect x="426" y="280" width="70" height="7" rx="3.5" fill="#111827"/>
    <rect x="426" y="295" width="50" height="6" rx="3" fill="#9CA3AF"/>
  </g>

  <!-- small globe -->
  <g>
    <circle cx="120" cy="320" r="34" fill="#0066FF" fill-opacity="0.08" stroke="#0066FF" stroke-opacity="0.3"/>
    <ellipse cx="120" cy="320" rx="14" ry="34" stroke="#0066FF" stroke-opacity="0.3" fill="none"/>
    <line x1="86" y1="320" x2="154" y2="320" stroke="#0066FF" stroke-opacity="0.3"/>
  </g>
</svg>
