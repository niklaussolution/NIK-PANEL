<svg width="640" height="500" viewBox="0 0 640 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ha-stage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="ha-area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF6B00" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FF6B00" stop-opacity="0"/>
    </linearGradient>
    <filter id="ha-shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="24" stdDeviation="34" flood-color="#0B1220" flood-opacity="0.16"/>
    </filter>
    <filter id="ha-card" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#0B1220" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- main application window -->
  <g filter="url(#ha-shadow)">
    <rect x="40" y="44" width="560" height="372" rx="16" fill="#FFFFFF" stroke="#E8ECF1"/>
    <!-- title bar -->
    <path d="M40 60a16 16 0 0 1 16-16h528a16 16 0 0 1 16 16v24H40V60z" fill="#FCFDFE"/>
    <line x1="40" y1="84" x2="600" y2="84" stroke="#EDF0F4"/>
    <circle cx="64" cy="64" r="4.5" fill="#E2554B"/>
    <circle cx="80" cy="64" r="4.5" fill="#E8A93C"/>
    <circle cx="96" cy="64" r="4.5" fill="#46B27A"/>
    <rect x="220" y="56" width="200" height="16" rx="8" fill="#F1F4F8"/>
    <rect x="300" y="61" width="44" height="6" rx="3" fill="#C7CFDA"/>

    <!-- sidebar -->
    <rect x="40" y="84" width="132" height="332" fill="#FBFCFE"/>
    <line x1="172" y1="84" x2="172" y2="416" stroke="#EDF0F4"/>
    <rect x="60" y="108" width="92" height="10" rx="5" fill="#FF6B00" opacity="0.85"/>
    <rect x="60" y="140" width="80" height="8" rx="4" fill="#D7DEE7"/>
    <rect x="60" y="164" width="92" height="8" rx="4" fill="#D7DEE7"/>
    <rect x="60" y="188" width="70" height="8" rx="4" fill="#D7DEE7"/>
    <rect x="60" y="212" width="84" height="8" rx="4" fill="#D7DEE7"/>
    <rect x="60" y="236" width="62" height="8" rx="4" fill="#D7DEE7"/>

    <!-- header row -->
    <rect x="192" y="104" width="120" height="12" rx="6" fill="#1E293B"/>
    <rect x="192" y="124" width="180" height="8" rx="4" fill="#CBD5E1"/>

    <!-- KPI cards -->
    <g>
      <rect x="192" y="150" width="124" height="74" rx="11" fill="#FFFFFF" stroke="#E8ECF1"/>
      <rect x="206" y="164" width="44" height="7" rx="3.5" fill="#94A3B8"/>
      <rect x="206" y="180" width="60" height="15" rx="4" fill="#0F172A"/>
      <rect x="206" y="205" width="96" height="6" rx="3" fill="#FFE7D2"/>
      <rect x="206" y="205" width="58" height="6" rx="3" fill="#FF6B00"/>
    </g>
    <g>
      <rect x="328" y="150" width="124" height="74" rx="11" fill="#FFFFFF" stroke="#E8ECF1"/>
      <rect x="342" y="164" width="44" height="7" rx="3.5" fill="#94A3B8"/>
      <rect x="342" y="180" width="60" height="15" rx="4" fill="#0F172A"/>
      <rect x="342" y="205" width="96" height="6" rx="3" fill="#D7E6FF"/>
      <rect x="342" y="205" width="40" height="6" rx="3" fill="#0066FF"/>
    </g>
    <g>
      <rect x="464" y="150" width="120" height="74" rx="11" fill="#FFFFFF" stroke="#E8ECF1"/>
      <rect x="478" y="164" width="44" height="7" rx="3.5" fill="#94A3B8"/>
      <rect x="478" y="180" width="60" height="15" rx="4" fill="#0F172A"/>
      <rect x="478" y="205" width="92" height="6" rx="3" fill="#D6F2E2"/>
      <rect x="478" y="205" width="78" height="6" rx="3" fill="#22A55E"/>
    </g>

    <!-- area chart -->
    <rect x="192" y="240" width="392" height="156" rx="12" fill="#FFFFFF" stroke="#E8ECF1"/>
    <rect x="208" y="256" width="90" height="9" rx="4.5" fill="#0F172A"/>
    <line x1="208" y1="372" x2="568" y2="372" stroke="#EDF0F4"/>
    <line x1="208" y1="340" x2="568" y2="340" stroke="#F3F5F8"/>
    <line x1="208" y1="308" x2="568" y2="308" stroke="#F3F5F8"/>
    <path d="M208 360 L262 332 L316 344 L370 300 L424 318 L478 280 L532 296 L568 276 L568 372 L208 372 Z" fill="url(#ha-area)"/>
    <path d="M208 360 L262 332 L316 344 L370 300 L424 318 L478 280 L532 296 L568 276"
      fill="none" stroke="#FF6B00" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="478" cy="280" r="4" fill="#FFFFFF" stroke="#FF6B00" stroke-width="2.5"/>
  </g>

  <!-- floating uptime card -->
  <g filter="url(#ha-card)">
    <rect x="430" y="372" width="176" height="78" rx="14" fill="#FFFFFF"/>
    <rect x="448" y="392" width="34" height="34" rx="9" fill="#ECFDF3"/>
    <path d="M457 409l5 5 9-10" stroke="#16A34A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="496" y="392" width="92" height="9" rx="4.5" fill="#0F172A"/>
    <rect x="496" y="409" width="64" height="7" rx="3.5" fill="#9AA6B4"/>
    <rect x="496" y="424" width="80" height="7" rx="3.5" fill="#16A34A" opacity="0.5"/>
  </g>

  <!-- floating mini deploy chip -->
  <g filter="url(#ha-card)">
    <rect x="34" y="300" width="150" height="60" rx="14" fill="#0F172A"/>
    <circle cx="60" cy="330" r="11" fill="#172033"/>
    <path d="M62 324l-7 8h6l-2 6 7-8h-6z" fill="#FF8A3D"/>
    <rect x="80" y="320" width="86" height="8" rx="4" fill="#E2E8F0"/>
    <rect x="80" y="334" width="58" height="7" rx="3.5" fill="#5B6678"/>
  </g>
</svg>
